<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contribuições PIX 2</title>


<style>

:root{

    --bg:#020617;

    --card:rgba(255,255,255,.08);

    --border:rgba(255,255,255,.12);

    --text:#ffffff;

    --sub:#94a3b8;

    --green:#22c55e;

    --green2:#4ade80;

}


.light{

    --bg:#f1fdf5;

    --card:rgba(255,255,255,.65);

    --border:rgba(255,255,255,.8);

    --text:#0f172a;

    --sub:#64748b;

}



*{

    margin:0;

    padding:0;

    box-sizing:border-box;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;

}



body{

    min-height:100vh;

    background:var(--bg);

    color:var(--text);

    overflow-x:hidden;

}



/* =====================
LOADER
===================== */


.loader{

    position:fixed;

    inset:0;

    background:#020617;

    z-index:999;

    display:flex;

    flex-direction:column;

    align-items:center;

    justify-content:center;

    transition:.6s;

}


.loader.hide{

    opacity:0;

    pointer-events:none;

}



.loader-circle{

    width:70px;

    height:70px;

    border-radius:50%;

    border:

    4px solid rgba(255,255,255,.15);


    border-top-color:#22c55e;


    animation:

    spin 1s linear infinite;

}



.loader span{

    margin-top:20px;

    color:#94a3b8;

}



@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}



/* =====================
BACKGROUND
===================== */


.background{

    position:fixed;

    inset:0;

    z-index:-1;

    overflow:hidden;

}



.aurora{

    position:absolute;

    border-radius:50%;

    filter:blur(120px);

}



.a1{

    width:500px;

    height:500px;

    background:#00ff8840;

    top:-150px;

    left:-150px;

    animation:
    move1 15s infinite alternate;

}


.a2{

    width:450px;

    height:450px;

    background:#22c55e40;

    right:-150px;

    top:20%;

    animation:
    move2 18s infinite alternate;

}


.a3{

    width:350px;

    height:350px;

    background:#00c85340;

    bottom:-100px;

    left:40%;

    animation:
    move3 20s infinite alternate;

}



.grid{

    position:absolute;

    inset:0;

    background-image:

    linear-gradient(
        rgba(255,255,255,.025) 1px,
        transparent 1px
    ),

    linear-gradient(
        90deg,
        rgba(255,255,255,.025) 1px,
        transparent 1px
    );


    background-size:40px 40px;

}



@keyframes move1{

    to{

        transform:
        translate(120px,100px);

    }

}


@keyframes move2{

    to{

        transform:
        translate(-120px,100px);

    }

}


@keyframes move3{

    to{

        transform:
        translateY(-100px);

    }

}



/* PARTICULAS */


.particle{

    position:absolute;

    bottom:-20px;

    width:4px;

    height:4px;

    border-radius:50%;

    background:white;

    opacity:0;


    box-shadow:

    0 0 10px white,

    0 0 20px #22c55e;


    animation:
    particleMove linear infinite;

}



@keyframes particleMove{


    0%{

        transform:
        translateY(0)
        scale(.5);

        opacity:0;

    }


    15%{

        opacity:.5;

    }


    85%{

        opacity:.5;

    }


    100%{

        transform:

        translateY(-120vh)

        scale(1.5);


        opacity:0;

    }

}



/* =====================
APP
===================== */


.container{

    max-width:430px;

    margin:auto;

    padding:24px;

}



.theme{

    display:flex;

    justify-content:center;

    gap:12px;

    margin-bottom:30px;

}



.theme button{

    border:none;

    padding:12px 22px;

    border-radius:999px;

    background:var(--card);

    color:var(--text);

    backdrop-filter:blur(20px);

    cursor:pointer;

}



.theme .active{

    background:

    linear-gradient(
        135deg,
        var(--green),
        var(--green2)
    );

    color:white;

}



.hero{

    text-align:center;

    margin-bottom:35px;

}


.hero h1{

    font-size:42px;

    font-weight:800;

}


.hero p{

    color:var(--sub);

    margin-top:10px;

}



.cards{

    display:flex;

    flex-direction:column;

    gap:20px;

}



.card{

    background:var(--card);

    border:1px solid var(--border);

    backdrop-filter:blur(35px);

    border-radius:30px;

    padding:22px;

    box-shadow:

    0 15px 40px rgba(0,0,0,.25);


}



.label{

    color:var(--green2);

    font-weight:700;

    margin-bottom:10px;

}



.key{

    margin-bottom:18px;

    word-break:break-all;

    line-height:1.5;

}



.copy{

    width:100%;

    padding:15px;

    border:none;

    border-radius:18px;

    color:white;

    font-weight:700;


    background:

    linear-gradient(
        135deg,
        #22c55e,
        #4ade80
    );

}



.footer{

    text-align:center;

    margin-top:50px;

}



.logo{

    width:90px;

}



.footer p{

    margin-top:10px;

    color:var(--sub);

}



.toast{

    position:fixed;

    bottom:30px;

    left:50%;

    transform:translateX(-50%);

    background:#22c55e;

    color:white;

    padding:14px 22px;

    border-radius:999px;

    opacity:0;

}



.toast.show{

    opacity:1;

}



</style>

</head>


<body>



<div class="loader" id="loader">

    <div class="loader-circle"></div>

    <span>Preparando...</span>

</div>



<div class="background">

    <div class="aurora a1"></div>

    <div class="aurora a2"></div>

    <div class="aurora a3"></div>

    <div class="grid"></div>

</div>




<div class="container">



<div class="theme">


<button class="active"
onclick="theme('dark',this)">
🌙 Dark
</button>


<button
onclick="theme('light',this)">
☀️ Light
</button>


</div>




<div class="hero">

<h1>
💚 Contribua
</h1>

<p>
Escolha uma chave PIX para realizar sua contribuição
</p>

</div>




<div class="cards">



<div class="card">

<div class="label">
PIX Celular
</div>

<div class="key">
(16) 99999-9999
</div>

<button class="copy"
onclick="copyPix('16999999999')">
Copiar chave PIX
</button>


</div>




<div class="card">

<div class="label">
PIX E-mail
</div>

<div class="key">
pix@empresa.com.br
</div>


<button class="copy"
onclick="copyPix('pix@empresa.com.br')">
Copiar chave PIX
</button>


</div>





<div class="card">


<div class="label">
PIX Aleatória
</div>


<div class="key">
123e4567-e89b-12d3-a456-426614174000
</div>


<button class="copy"
onclick="copyPix('123e4567-e89b-12d3-a456-426614174000')">

Copiar chave PIX

</button>


</div>


</div>




<div class="footer">


<img src="logo.png" class="logo">


<p>
Obrigado pelo apoio 💚
</p>


</div>



</div>



<div class="toast" id="toast">

PIX copiado!

</div>




<script>


/* cria partículas */

for(let i=0;i<30;i++){


let p=document.createElement("div");

p.className="particle";


p.style.left=Math.random()*100+"%";


p.style.animationDuration=
(10+Math.random()*10)+"s";


p.style.animationDelay=
(i*.25)+"s";


document
.querySelector(".background")
.appendChild(p);


}




window.onload=()=>{


setTimeout(()=>{

document
.getElementById("loader")
.classList.add("hide");


},1200);


}




function copyPix(valor){

navigator.clipboard.writeText(valor);


let t=document.getElementById("toast");

t.classList.add("show");


setTimeout(()=>{

t.classList.remove("show");

},2000);


}



function theme(tipo,btn){


if(tipo==="light")

document.body.classList.add("light");

else

document.body.classList.remove("light");



document
.querySelectorAll(".theme button")
.forEach(b=>b.classList.remove("active"));


btn.classList.add("active");


}


</script>



</body>

</html>
